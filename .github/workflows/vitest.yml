name: Unit Tests

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      # revisit-mcp-ts is not a yarn workspace, so the root install does not
      # cover it. Its specs run as part of the root suite and need these deps.
      - name: Install MCP dependencies
        run: yarn --cwd revisit-mcp-ts install --frozen-lockfile

      - name: Run unit tests
        run: yarn unittest
