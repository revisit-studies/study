<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Svelte Trrack Demo</title>
    <style>
        body {
            color: #1f2933;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 24px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        button {
            background: #ffffff;
            border: 1px solid #9aa5b1;
            border-radius: 4px;
            color: #1f2933;
            cursor: pointer;
            font: inherit;
            padding: 6px 12px;
        }

        button:hover {
            background: #f5f7fa;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "svelte/internal": "https://unpkg.com/svelte@3.59.2/internal/index.mjs"
            }
        }
    </script>
    <script src="https://unpkg.com/svelte@3.59.2/compiler.js"></script>
</head>

<body>
    <div id="app"></div>
    <div id="load-error" role="alert" hidden>
        Unable to load the Svelte dot counter.
    </div>

    <script src="../../revisitUtilities/revisit-communicate.js"></script>

    <script type="module">
        import { Registry, initializeTrrack } from 'https://cdn.jsdelivr.net/npm/@trrack/core@1.3.0/+esm';

        const taskId = 'circlesCount';
        const initialState = {
            dots: [1]
        };

        const registry = Registry.create();
        const updateDots = registry.register(
            'update-dots',
            (state, task) => {
                if (task === 'add') {
                    const lastCount = state.dots[state.dots.length - 1] || 0;
                    state.dots.push(lastCount + 1);
                } else {
                    state.dots.pop();
                }
            }
        );

        const trrack = initializeTrrack({
            initialState,
            registry
        });

        async function loadComponent() {
            const response = await fetch('./DotCounter.svelte');
            const source = await response.text();
            const compiled = svelte.compile(source, {
                format: 'esm'
            });
            const moduleUrl = URL.createObjectURL(new Blob([compiled.js.code], {
                type: 'text/javascript'
            }));
            const module = await import(moduleUrl);
            URL.revokeObjectURL(moduleUrl);
            return module.default;
        }

        try {
            const DotCounter = await loadComponent();
            const component = new DotCounter({
                target: document.getElementById('app'),
                props: {
                    dots: trrack.getState().dots,
                    addDot: () => trrack.apply('Add Dot', updateDots('add')),
                    removeDot: () => trrack.apply('Remove Dot', updateDots('remove')),
                    undo: () => trrack.undo(),
                    redo: () => trrack.redo()
                }
            });

            function updateRevisit() {
                const dots = trrack.getState().dots;
                component.$set({ dots });
                Revisit.postAnswers({
                    [taskId]: dots.length
                });
                Revisit.postProvenance(trrack.graph.backend);
            }

            trrack.currentChange(updateRevisit);
            updateRevisit();

            Revisit.onProvenanceReceive((provenanceState) => {
                component.$set({ dots: provenanceState.dots });
            });
        } catch (error) {
            document.getElementById('load-error').hidden = false;
            throw error;
        }
    </script>
</body>

</html>
