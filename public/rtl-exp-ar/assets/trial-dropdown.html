<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trial</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Segoe UI Arabic", sans-serif;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      min-height: 100vh;
      direction: rtl;
    }

    #stimulus-container {
      width: 100%;
      max-width: 760px;
      display: flex;
      justify-content: center;
    }

    #chart-img {
      max-width: 720px;
      width: 100%;
      height: auto;
    }

    #countdown-bar-container {
      width: 100%;
      max-width: 720px;
      height: 6px;
      background: #e9ecef;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    #countdown-bar {
      height: 100%;
      width: 100%;
      background: #228be6;
      border-radius: 3px;
      transition: width linear;
    }

    #answer-container {
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
      text-align: right;
    }

    #answer-container.visible {
      display: flex;
    }

    #note-text {
      font-size: 14px;
      color: #555;
      font-style: italic;
    }

    #answer-container label {
      font-size: 16px;
      font-weight: 600;
      color: #212529;
    }

    #dropdown-select {
      width: 260px;
      padding: 8px 12px;
      font-size: 16px;
      border: 2px solid #ced4da;
      border-radius: 6px;
      background: #fff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: right;
      direction: rtl;
    }

    #dropdown-select:focus {
      border-color: #228be6;
    }

    #hidden-msg {
      font-size: 14px;
      color: #868e96;
      margin-top: 4px;
      display: none;
      text-align: center;
    }

    #hidden-msg.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div id="stimulus-container">
    <img id="chart-img" src="" alt="الرسم البياني" />
  </div>
  <div id="countdown-bar-container">
    <div id="countdown-bar"></div>
  </div>
  <p id="hidden-msg">
    ⚠️ تم إخفاء الرسم البياني. يرجى الإجابة من الذاكرة.
  </p>

  <div id="answer-container">
    <p id="note-text"></p>
    <label id="answer-label" for="dropdown-select">إجابتك:</label>
    <select id="dropdown-select" dir="rtl">
      <option value="">-- اختر إجابة --</option>
    </select>
  </div>

  <script src="../../revisitUtilities/revisit-communicate.js"></script>
  <script>
    const DISPLAY_TIME_MS = 10000;

    let responseId = 'trial-ans';

    function setupCountdownBar(durationMs) {
      const bar = document.getElementById('countdown-bar');
      bar.style.transition = 'none';
      bar.style.width = '100%';
      bar.getBoundingClientRect();
      bar.style.transition = `width ${durationMs}ms linear`;
      bar.style.width = '0%';
    }

    function hideChartAndShowAnswer() {
      document.getElementById('stimulus-container').style.display = 'none';
      document.getElementById('countdown-bar-container').style.display = 'none';
      document.getElementById('hidden-msg').classList.add('visible');
      document.getElementById('answer-container').classList.add('visible');
    }

    function postCurrentAnswer() {
      const val = document.getElementById('dropdown-select').value;
      if (val === '') return;
      const answers = {};
      answers[responseId] = val;
      Revisit.postAnswers(answers);
    }

    Revisit.onDataReceive(function(data) {
      const imagePath = data['imagePath'] || '';
      const prompt = data['prompt'] || 'إجابتك:';
      const note = data['note'] || '';
      const options = data['options'] || [];
      responseId = data['responseId'] || 'trial-ans';

      document.getElementById('chart-img').src = '/' + imagePath;
      document.getElementById('answer-label').textContent = prompt;

      if (note) {
        document.getElementById('note-text').textContent = note;
        document.getElementById('note-text').style.display = 'block';
      } else {
        document.getElementById('note-text').style.display = 'none';
      }

      const select = document.getElementById('dropdown-select');
      while (select.options.length > 1) {
        select.remove(1);
      }
      options.forEach(function(opt) {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = opt;
        select.appendChild(option);
      });

      setupCountdownBar(DISPLAY_TIME_MS);
      setTimeout(hideChartAndShowAnswer, DISPLAY_TIME_MS);

      Revisit.postReady();
    });

    document.getElementById('dropdown-select').addEventListener('change', postCurrentAnswer);
  </script>
</body>
</html>
